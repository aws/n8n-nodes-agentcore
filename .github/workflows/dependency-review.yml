name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # Permissive licenses only. GPL / AGPL / SSPL / commercial-only NOT permitted -
          # this is a redistributed npm package, so copyleft transitives would force
          # license changes on every downstream user.
          allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, Unlicense, CC0-1.0
          comment-summary-in-pr: on-failure
