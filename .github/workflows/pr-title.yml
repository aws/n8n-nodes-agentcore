name: Validate PR Title

on:
  # pull_request_target so this runs on fork PRs (read-only metadata access; no checkout of fork code).
  pull_request_target:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

permissions:
  statuses: write
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            The subject "{subject}" in PR title "{title}" must start with a lowercase letter.
            Example: "feat: add memory auto-provisioning"
          ignoreLabels: |
            dependencies
            release
