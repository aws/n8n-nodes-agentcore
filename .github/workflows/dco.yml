name: DCO Sign-off Check

# pull_request_target is safe here: this workflow only reads commit metadata
# via the GitHub API. It does not check out or execute any PR code.
on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-dco:
    runs-on: ubuntu-latest
    steps:
      - name: Verify all commits are signed off
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo, pull_number: prNumber, per_page: 100,
            });

            // Match `Signed-off-by: Name <email>` anywhere in the message body.
            const re = /^Signed-off-by: .+ <[^<>@\s]+@[^<>@\s]+>$/m;

            const failing = commits.filter((c) => !re.test(c.commit.message));

            if (failing.length > 0) {
              const lines = failing.map((c) => {
                const subject = c.commit.message.split('\n')[0];
                return `  ${c.sha.substring(0, 7)}  ${subject}`;
              }).join('\n');

              core.setFailed(
                `Missing DCO sign-off on ${failing.length} commit(s):\n` +
                lines +
                `\n\nFix by adding sign-off to each unsigned commit:\n` +
                `  git commit --amend -s          (most recent commit)\n` +
                `  git rebase --signoff HEAD~N    (last N commits)\n\n` +
                `Then force-push your branch. See CONTRIBUTING.md for the full DCO process.`
              );
            } else {
              core.info(`OK: All ${commits.length} commit(s) signed off`);
            }
